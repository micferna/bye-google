---
- name: Paquets de base
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3
      - rsync
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Régler le fuseau horaire
  community.general.timezone:
    name: "{{ timezone }}"
  register: tz_result
  failed_when: false
  changed_when: tz_result is changed

- name: Créer l'arborescence des données
  ansible.builtin.file:
    path: "{{ data_root }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - core
    - nextcloud
    - immich
    - minio
    - apps
    - backup

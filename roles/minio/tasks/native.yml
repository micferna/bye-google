---
# MinIO en natif : binaire + systemd, sans conteneur.
- name: Créer l'utilisateur système minio
  ansible.builtin.user:
    name: minio
    system: true
    shell: /usr/sbin/nologin
    home: "{{ data_root }}/minio"
    create_home: false

- name: Dossier de données MinIO
  ansible.builtin.file:
    path: "{{ data_root }}/minio/data"
    state: directory
    owner: minio
    group: minio
    mode: "0750"

- name: Télécharger le binaire MinIO
  ansible.builtin.get_url:
    url: "https://dl.min.io/server/minio/release/linux-{{ minio_arch }}/minio"
    dest: /usr/local/bin/minio
    mode: "0755"
  notify: Restart minio

- name: Télécharger le client mc
  ansible.builtin.get_url:
    url: "https://dl.min.io/client/mc/release/linux-{{ minio_arch }}/mc"
    dest: /usr/local/bin/mc
    mode: "0755"

- name: Fichier d'environnement MinIO
  ansible.builtin.template:
    src: minio.env.j2
    dest: /etc/default/minio
    owner: root
    mode: "0640"
  notify: Restart minio

- name: Unité systemd MinIO
  ansible.builtin.template:
    src: minio.service.j2
    dest: /etc/systemd/system/minio.service
    mode: "0644"
  notify: Restart minio

- name: Démarrer et activer MinIO
  ansible.builtin.systemd:
    name: minio
    enabled: true
    state: started
    daemon_reload: true

# App bye-google : Uptime-Kuma (supervision / page de statut)
name: uptime-kuma

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    volumes:
      - data:/app/data
    # Port loopback (inoffensif en mode conteneur ; utilisé si Caddy est natif)
    ports:
      - "127.0.0.1:8201:3001"
    networks: [edge]

volumes:
  data:

networks:
  edge:
    external: true
